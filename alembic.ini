# Alembic config for manual use (e.g. `alembic revision --autogenerate`).
# At runtime the app configures Alembic programmatically in rss_reader.db; the
# database URL here is left blank so env.py falls back to config.database_url().
[alembic]
script_location = backend/migrations
prepend_sys_path = backend
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
